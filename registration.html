<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration Hub | Placement Portal</title>

<!-- Google Fonts for better title -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", Arial, sans-serif;
}
html,body{
    height:100%;
}

/* ===== BACKGROUND ===== */
body{
    background:url("bg3.jpg") no-repeat center center/cover;
    background-attachment: fixed;
}

/* ===== HEADER ===== */
.header{
    background:rgba(44,47,90,0.95);
    display:flex;
    align-items:center;
    padding:14px 40px;
}
.logo img{
    width:55px;
}
.title{
    margin-left:15px;
}
.title h1{
    color:#fff;
    font-size:24px;
}
.title p{
    color:#dcdcff;
    font-size:14px;
}

/* NAVIGATION */
.nav{
    margin-left:auto;
}
.nav a{
    color:#fff;
    text-decoration:none;
    margin-left:18px;
    font-size:14px;
    font-weight:600;
}
.nav a:hover{
    color:#ffdf6c;
}

/* ===== MAIN ===== */
.main{
    height:calc(100vh - 90px);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    text-align:center;
}

/* IMPRESSIVE TITLE */
.main h2{
    font-family: 'Montserrat', sans-serif;
    color:#fff;
    font-size:36px;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
    margin-bottom:40px;
}

/* BUTTONS */
.button{
    display:inline-block;
    text-decoration:none;
    padding:15px 30px;
    margin:10px;
    font-size:16px;
    font-weight:600;
    color:#fff;
    background:#5a5fcf;
    border-radius:8px;
    transition:0.3s;
}
.button:hover{
    background:#3f44b5;
}

/* ===== FOOTER ===== */
.footer{
    width:100%;
    text-align:center;
    padding:10px;
    font-size:13px;
    background:rgba(255,255,255,0.85);
    color:#444;
    position:relative;
}

/* ===== RESPONSIVE ===== */
@media(max-width:480px){
    .main h2{
        font-size:28px;
    }
    .button{
        width:80%;
        text-align:center;
        padding:12px 0;
    }
}
</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<div class="header">
    <div class="logo">
        <img src="logo.jpg" alt="Ranchi Women's College Logo">
    </div>

    <div class="title">
        <h1>Ranchi Women's College</h1>
        <p>Placement Cell Management System</p>
    </div>

    <div class="nav">
        <a href="front.html">Home</a>
        <a href="studentlogin.html">Student Login</a>
        <a href="companylogin.html">Company Login</a>
        <a href="registration.html">Registration</a>
        <a href="adminlogin.html">Admin</a>
        <a href="contact.html">Contact</a>
    </div>
</div>

<!-- ===== MAIN ===== -->
<div class="main">
    <h2>Register for Placement Portal</h2>

    <a href="studentregistration.html" class="button">Student Registration</a>
    <a href="companyregistration.html" class="button">Company Registration</a>
</div>

<!-- ===== FOOTER ===== -->
<div class="footer">
    © 2025 Ranchi Women’s College | Placement Cell
</div>

</body>
</html>
